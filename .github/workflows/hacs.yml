name: HACS validation

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: plugin
          # Screenshots are only required for default-store submission, not
          # for custom-repository installs (which is all this repo targets
          # today). Revisit if/when submitting to the default HACS store.
          ignore: images
