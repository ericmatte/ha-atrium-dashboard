name: Build dist

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-dist-main
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Commit dist, bump version, and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          LATEST_TAG=$(gh release view --json tagName --jq .tagName 2>/dev/null || true)
          if [ -n "$LATEST_TAG" ] && git show "$LATEST_TAG:dist/strategy.js" 2>/dev/null | diff -q - dist/strategy.js >/dev/null; then
            echo "Bundle is identical to $LATEST_TAG, nothing to release."
            exit 0
          fi

          VERSION=$(node -p "require('./package.json').version")
          while gh release view "v$VERSION" >/dev/null 2>&1; do
            npm version minor --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist/strategy.js package.json package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: rebuild dist/strategy.js [skip ci]"
            git push origin HEAD:main
          fi

          gh release create "v$VERSION" dist/strategy.js --title "v$VERSION" --generate-notes --target main
