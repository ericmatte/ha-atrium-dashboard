name: Build dist

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-dist-main
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build

      - name: Check for a build diff
        id: diff
        run: |
          git add -f dist/strategy.js
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # A build diff with no version bump means source changed without the
      # author bumping package.json — i.e. the current version is already
      # released and would otherwise go out stale. Bump past every already-
      # released version (a loop in case more than one was skipped) so the
      # commit below always ships under a fresh, unreleased version.
      - name: Bump version if the current one is already released
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          while gh release view "v$VERSION" >/dev/null 2>&1; do
            npm version minor --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
          done

      - name: Commit dist/strategy.js (and package.json if it was bumped)
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist/strategy.js package.json package-lock.json
          git commit -m "chore: rebuild dist/strategy.js [skip ci]"
          git push origin HEAD:main

      - name: Create the release
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          gh release create "$TAG" dist/strategy.js \
            --title "$TAG" \
            --generate-notes \
            --target main
