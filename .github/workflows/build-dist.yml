name: Build dist

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-dist-main
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Commit, bump version if needed, and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add -f dist/strategy.js
          git diff --cached --quiet && exit 0

          VERSION=$(node -p "require('./package.json').version")
          while gh release view "v$VERSION" >/dev/null 2>&1; do
            npm version minor --no-git-tag-version
            VERSION=$(node -p "require('./package.json').version")
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist/strategy.js package.json package-lock.json
          git commit -m "chore: rebuild dist/strategy.js [skip ci]"
          git push origin HEAD:main

          gh release create "v$VERSION" dist/strategy.js --title "v$VERSION" --generate-notes --target main
